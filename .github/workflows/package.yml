name: Package OpenHarmony HAP

on:
  workflow_dispatch:
    inputs:
      app-name:
        description: App display name
        required: false
        default: LÖVE for OpenHarmony
      bundle-id:
        description: OpenHarmony bundleName
        required: false
        default: org.love2d.openharmony
      love-package:
        description: Path to the .love package in this repository. Defaults to game.love.
        required: false
      product-name:
        description: Base name of generated HAP files
        required: false
        default: love-openharmony
      version-string:
        description: OpenHarmony versionName
        required: false
        default: 1.0.0
      version-code:
        description: OpenHarmony numeric versionCode
        required: false
        default: '1000000'
      build-mode:
        description: Hvigor build mode
        required: false
        default: debug
        type: choice
        options:
          - debug
          - release
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: read

env:
  LOVE_PACKAGE: ${{ github.event.inputs['love-package'] || 'game.love' }}

jobs:
  package-openharmony:
    name: Build OpenHarmony HAP (${{ matrix.jit_name }})
    runs-on: ubuntu-latest
    container: ghcr.io/bytemain/harmony-next-pipeline-docker/harmonyos-ci-image:v6.0.2.642
    strategy:
      fail-fast: false
      matrix:
        include:
          - jit_name: jit
            love_jit: 'true'
          - jit_name: jit-off
            love_jit: 'false'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Prepare default LÖVE package
        shell: bash
        env:
          LOVE_PACKAGE: ${{ env.LOVE_PACKAGE }}
        run: |
          set -euo pipefail
          if [ -f "$LOVE_PACKAGE" ]; then
            echo "Using existing LÖVE package: $LOVE_PACKAGE"
            exit 0
          fi

          command -v zip >/dev/null || {
            echo "zip is required to create the default LÖVE package." >&2
            exit 1
          }

          package_dir="$(dirname "$LOVE_PACKAGE")"
          mkdir -p "$package_dir"
          package_name="$(basename "$LOVE_PACKAGE")"
          package_abs="$(cd "$package_dir" && pwd)/$package_name"
          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "$tmp_dir"' EXIT

          printf '%s\n' \
            'function love.draw()' \
            "  love.graphics.print('LÖVE for OpenHarmony', 32, 32)" \
            'end' > "$tmp_dir/main.lua"

          zip -j -q -0 "$package_abs" "$tmp_dir/main.lua"
          echo "Created default LÖVE package: $LOVE_PACKAGE"

      - name: Build OpenHarmony HAP
        id: build-hap
        uses: ./
        with:
          app-name: ${{ github.event.inputs['app-name'] || 'LÖVE for OpenHarmony' }}
          bundle-id: ${{ github.event.inputs['bundle-id'] || 'org.love2d.openharmony' }}
          love-ref: ${{ github.sha }}
          love-package: ${{ env.LOVE_PACKAGE }}
          product-name: ${{ github.event.inputs['product-name'] || 'love-openharmony' }}-${{ matrix.jit_name }}
          version-string: ${{ github.event.inputs['version-string'] || '1.0.0' }}
          version-code: ${{ github.event.inputs['version-code'] || '1000000' }}
          build-mode: ${{ github.event.inputs['build-mode'] || 'debug' }}
          love-jit: ${{ matrix.love_jit }}
          output-folder: ./dist

      - name: Upload HAP artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openharmony-hap-${{ matrix.jit_name }}
          path: ${{ steps.build-hap.outputs.package-paths }}
          if-no-files-found: error
